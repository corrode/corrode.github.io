<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 576" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Go and Rust usage among developers, 2017–2024</title>

  <!-- Title (centered) -->
  <text x="540" y="42" font-size="22" font-weight="600" text-anchor="middle" fill="#1a1a1a">Go and Rust usage among developers, 2017–2024</text>

  <!-- Legend (top-right, clear of bar labels) -->
  <g font-size="13" fill="#1a1a1a">
    <rect x="880" y="28" width="14" height="14" fill="#5a5a5a"/>
    <text x="900" y="40">Go</text>
    <rect x="940" y="28" width="14" height="14" fill="#dea584"/>
    <text x="960" y="40">Rust</text>
  </g>

  <!-- Y-axis gridlines -->
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="80" y1="516" x2="1040" y2="516"/>
    <line x1="80" y1="470.4" x2="1040" y2="470.4"/>
    <line x1="80" y1="424.8" x2="1040" y2="424.8"/>
    <line x1="80" y1="379.2" x2="1040" y2="379.2"/>
    <line x1="80" y1="333.6" x2="1040" y2="333.6"/>
    <line x1="80" y1="288" x2="1040" y2="288"/>
    <line x1="80" y1="242.4" x2="1040" y2="242.4"/>
    <line x1="80" y1="196.8" x2="1040" y2="196.8"/>
    <line x1="80" y1="151.2" x2="1040" y2="151.2"/>
    <line x1="80" y1="105.6" x2="1040" y2="105.6"/>
    <line x1="80" y1="60" x2="1040" y2="60"/>
  </g>

  <!-- Y-axis labels (0% to 20%, 22.8 px per percent) -->
  <g font-size="12" fill="#5a5a5a" text-anchor="end">
    <text x="72" y="520">0%</text>
    <text x="72" y="474.4">2%</text>
    <text x="72" y="428.8">4%</text>
    <text x="72" y="383.2">6%</text>
    <text x="72" y="337.6">8%</text>
    <text x="72" y="292">10%</text>
    <text x="72" y="246.4">12%</text>
    <text x="72" y="200.8">14%</text>
    <text x="72" y="155.2">16%</text>
    <text x="72" y="109.6">18%</text>
    <text x="72" y="64">20%</text>
  </g>

  <!--
    Group geometry: 8 years across [100..1040] = 940 px → ~117.5 px/group, centered at 158.75, 276.25, ...
    Two bars per group, width 45, gap 5; left bar starts at center-50, right bar starts at center+5.
    1% = 22.8 px, baseline y = 516.
  -->

  <!-- Go bars (gray) -->
  <g fill="#5a5a5a">
    <!-- 2017: 8% -->
    <rect x="108.75"  y="333.6" width="45" height="182.4"/>
    <!-- 2018: 12% -->
    <rect x="226.25" y="242.4" width="45" height="273.6"/>
    <!-- 2019: 18% -->
    <rect x="343.75" y="105.6" width="45" height="410.4"/>
    <!-- 2020: 19% -->
    <rect x="461.25" y="82.8"  width="45" height="433.2"/>
    <!-- 2021: 17% -->
    <rect x="578.75" y="128.4" width="45" height="387.6"/>
    <!-- 2022: 19% -->
    <rect x="696.25" y="82.8"  width="45" height="433.2"/>
    <!-- 2023: 17% -->
    <rect x="813.75" y="128.4" width="45" height="387.6"/>
    <!-- 2024: 18% -->
    <rect x="931.25" y="105.6" width="45" height="410.4"/>
  </g>

  <!-- Rust bars (rust-orange). 2017 has no data. -->
  <g fill="#dea584">
    <!-- 2018: 2% -->
    <rect x="276.25" y="470.4" width="45" height="45.6"/>
    <!-- 2019: 5% -->
    <rect x="393.75" y="402"   width="45" height="114"/>
    <!-- 2020: 7% -->
    <rect x="511.25" y="356.4" width="45" height="159.6"/>
    <!-- 2021: 6% -->
    <rect x="628.75" y="379.2" width="45" height="136.8"/>
    <!-- 2022: 9% -->
    <rect x="746.25" y="310.8" width="45" height="205.2"/>
    <!-- 2023: 10% -->
    <rect x="863.75" y="288"   width="45" height="228"/>
    <!-- 2024: 11% -->
    <rect x="981.25" y="265.2" width="45" height="250.8"/>
  </g>

  <!-- Value labels above bars -->
  <g font-size="12" font-weight="600" text-anchor="middle">
    <!-- Go labels -->
    <g fill="#1a1a1a">
      <text x="131.25" y="324">8%</text>
      <text x="248.75" y="233">12%</text>
      <text x="366.25" y="96">18%</text>
      <text x="483.75" y="73">19%</text>
      <text x="601.25" y="119">17%</text>
      <text x="718.75" y="73">19%</text>
      <text x="836.25" y="119">17%</text>
      <text x="953.75" y="96">18%</text>
    </g>
    <!-- "no data" marker for Rust 2017 -->
    <text x="178.75" y="510" fill="#aaa" font-weight="400">n/a</text>
    <!-- Rust labels -->
    <g fill="#8a4a1a">
      <text x="298.75" y="461">2%</text>
      <text x="416.25" y="392">5%</text>
      <text x="533.75" y="347">7%</text>
      <text x="651.25" y="370">6%</text>
      <text x="768.75" y="301">9%</text>
      <text x="886.25" y="278">10%</text>
      <text x="1003.75" y="255">11%</text>
    </g>
  </g>

  <!-- X-axis -->
  <line x1="80" y1="516" x2="1040" y2="516" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- X-axis labels (centered on each year group) -->
  <g font-size="13" fill="#1a1a1a" text-anchor="middle">
    <text x="158.75"  y="540">2017</text>
    <text x="276.25" y="540">2018</text>
    <text x="393.75" y="540">2019</text>
    <text x="511.25" y="540">2020</text>
    <text x="628.75" y="540">2021</text>
    <text x="746.25" y="540">2022</text>
    <text x="863.75" y="540">2023</text>
    <text x="981.25" y="540">2024</text>
  </g>

  <!-- Source -->
  <text x="540" y="568" font-size="11" fill="#888" text-anchor="middle">Source: JetBrains State of Developer Ecosystem 2024</text>
</svg>
