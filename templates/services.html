{% extends "base.html" %} {% block content %}
<div id="question-container"></div>

<button id="prevQuestion" style="display: none">Previous</button>
<button id="nextQuestion">Next</button>

<script>
  const languageOptions = [
    "Python",
    "Go",
    "TypeScript",
    "Java",
    "Kotlin",
    "C++",
    "C",
    "C#",
    "Haskell",
    "Nim",
    "Zig",
    "Other",
  ];

  const questions = [
    {
      type: "radio",
      question:
        "Are you an individual developer or are you filling out this form on behalf of an organization?",
      id: "devExperience",
      options: ["Individual", "Organization"],
    },
    {
      type: "radio",
      question:
        "How many years of software development experience do you have?",
      id: "devExperience",
      options: ["<1 year", "1-3 years", "3-5 years", "5+ years"],
    },
    {
      type: "multipleChoice",
      question: "Which programming languages are you most proficient in?",
      id: "proficientLanguages",
      options: languageOptions,
    },
    {
      type: "multipleChoice",
      question:
        "Which other languages besides Rust would you consider to be good alternatives for your applications?",
      id: "alternativeLanguages",
      options: languageOptions,
    },
    {
      type: "radio",
      question: "Please describe your experience with Rust.",
      id: "rustExperience",
      options: [
        "I have never used Rust",
        "I have written a few lines of Rust code",
        "I have written a small project in Rust",
        "I have written a large project in Rust",
      ],
    },
    {
      type: "multipleChoice",
      question: "What motivates your interest in Rust?",
      id: "motivationRust",
      options: [
        "Performance benefits",
        "Memory safety without garbage collection",
        "Curiosity about new technologies",
        "Potential for career development",
      ],
    },
    {
      type: "input",
      question:
        "What do you see as the biggest challenge in adopting Rust in your organization?",
      id: "biggestChallenge",
    },
    {
      type: "multipleChoice",
      question:
        "What kind of support or resources would you need to successfully adopt Rust?",
      id: "neededSupport",
      options: [
        "Training courses",
        "Mentorship programs",
        "Hands-on implementation support",
        "Other",
      ],
    },
    {
      type: "email",
      question:
        "Please enter your email to receive a customized proposal based on your needs.",
      id: "email",
    },
  ];
  let currentQuestionIndex = 1;

  document.getElementById("nextQuestion").addEventListener("click", () => {
    if (currentQuestionIndex < questions.length) {
      displayQuestion(currentQuestionIndex++);
    } else {
      submitQuiz();
    }
  });

  document.getElementById("prevQuestion").addEventListener("click", () => {
    if (currentQuestionIndex > 1) {
      // Ensure there is a previous question
      currentQuestionIndex -= 2; // Adjust because displayQuestion will increment
      if (currentQuestionIndex < 0) currentQuestionIndex = 0; // Safety check
      displayQuestion(currentQuestionIndex++);
    }
  });

  function displayQuestion(index) {
    history.pushState(
      { index: index },
      `Question ${index}`,
      `?question=${index}`
    );

    const questionContainer = document.getElementById("question-container");
    questionContainer.innerHTML = ""; // Clear existing content

    const question = questions[index];
    const questionElement = document.createElement("div");
    questionElement.className = "question";
    questionElement.innerHTML = `<h2>${question.question}</h2>`;

    let inputElement;

    switch (question.type) {
      case "multipleChoice":
        question.options.forEach((option) => {
          const optionElement = document.createElement("label");
          optionElement.innerHTML = `<input type="checkbox" name="${question.id}" value="${option}"> ${option}<br>`;
          questionElement.appendChild(optionElement);
        });
        break;
      case "checkbox":
        question.options.forEach((option) => {
          inputElement = document.createElement("input");
          inputElement.type = "checkbox";
          inputElement.id = option;
          inputElement.value = option;
          questionElement.appendChild(inputElement);
          questionElement.appendChild(document.createTextNode(option));
        });
        break;
      case "input":
      case "email":
        inputElement = document.createElement("input");
        inputElement.type = question.type === "email" ? "email" : "text";
        inputElement.id = question.id;
        // Append inputElement to questionElement, not directly to questionContainer
        questionElement.appendChild(inputElement);
        break;
      case "yesno":
        ["Yes", "No"].forEach((option) => {
          inputElement = document.createElement("input");
          inputElement.type = "radio";
          inputElement.name = question.id;
          inputElement.value = option.toLowerCase();
          questionElement.appendChild(inputElement);
          questionElement.appendChild(document.createTextNode(option));
        });
        break;
      case "scale":
        for (let i = 1; i <= question.scale; i++) {
          inputElement = document.createElement("input");
          inputElement.type = "radio";
          inputElement.name = question.id;
          inputElement.value = i.toString();
          questionElement.appendChild(inputElement);
          questionElement.appendChild(document.createTextNode(i.toString()));
        }
        break;
      case "radio":
        question.options.forEach((option) => {
          inputElement = document.createElement("input");
          inputElement.type = "radio";
          inputElement.name = question.id;
          inputElement.value = option;
          inputElement.addEventListener("change", () => {
            // Automatically move to the next question on selecting a radio option
            if (currentQuestionIndex < questions.length) {
              displayQuestion(currentQuestionIndex++);
            } else {
              submitQuiz();
            }
          });
          questionElement.appendChild(inputElement);
          questionElement.appendChild(document.createTextNode(option));
        });
        break;
    }

    // Append the fully constructed questionElement to the questionContainer
    questionContainer.appendChild(questionElement);

    if (currentQuestionIndex > 1) {
      document.getElementById("prevQuestion").style.display = "";
    } else {
      document.getElementById("prevQuestion").style.display = "none";
    }

    // Enable the 'Next' button as soon as any input is made
    document.getElementById("nextQuestion").disabled = true; // Initially disabled

    // Attach event listeners directly to inputs for immediate feedback
    const inputs = questionContainer.querySelectorAll(
      "input[type='text'], input[type='email'], input[type='radio'], input[type='checkbox']"
    );
    inputs.forEach((input) => {
      input.addEventListener("input", () => {
        // For text and email fields, enable the Next button as soon as there is any input
        document.getElementById("nextQuestion").disabled = false;
      });
      input.addEventListener("change", () => {
        // For radio buttons and checkboxes, enable the Next button as soon as an option is selected
        document.getElementById("nextQuestion").disabled = false;
      });
    });
  }

  function submitQuiz() {
    // Gather responses and submit
    // Placeholder for actual implementation
  }

  displayQuestion(0); // Initialize with the first question

  window.addEventListener("popstate", function (event) {
    if (event.state) {
      displayQuestion(event.state.index);
    } else {
      // You can decide what to do if there's no state; e.g., go back to the first question
      displayQuestion(0);
    }
  });
</script>

<style>
  .quiz-flex-container {
    display: flex;
    gap: 10px; /* Adjust based on your preference */
  }

  .quiz-button {
    margin: 20px 0;
    padding: 15px;
    border-radius: 8px;
    background-color: #007bff; /* Replace $brightPrim with actual color value */
    color: white;
    white-space: nowrap;
    cursor: pointer;
    flex: 1; /* Makes buttons take up equal space */
    text-align: center;
  }

  .quiz-button input[type="radio"] {
    display: none; /* Hide the actual radio button */
  }
</style>

{% endblock content %}
