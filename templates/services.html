{% extends "base.html" %} {% block content %}

<div class="quiz-container">
  <div class="progress-container">
    <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
  </div>
  <div id="question-container"></div>

  <div id="navigation-container">
    <button class="navbutton" id="prevQuestion" style="display: none">
      Previous
    </button>
    <button class="navbutton" id="nextQuestion">Next</button>
  </div>
</div>

<script>
  // Track can be 'individual' or 'org'
  let userTrack = null;

  const languageOptions = [
    "Python",
    "Go",
    "TypeScript",
    "Java",
    "Kotlin",
    "C++",
    "C",
    "C#",
    "Haskell",
    "Nim",
    "Zig",
    "Other",
  ];

  const questions = [
    {
      type: "radio",
      question:
        "Are you looking for services as an individual or on behalf of an organization?",
      id: "serviceType",
      options: ["Individual", "Organization"],
    },
    {
      type: "radio",
      question:
        "How many years of software development experience do you have?",
      id: "devExperience",
      options: ["<1 year", "1-3 years", "3-5 years", "5+ years"],
      track: "individual",
    },
    {
      type: "multipleChoice",
      question: "Which programming languages are you most proficient in?",
      id: "proficientLanguages",
      options: languageOptions,
      track: "individual",
    },
    {
      type: "multipleChoice",
      question:
        "What languages would you consider as good alternatives to Rust for your applications?",
      id: "alternativeLanguages",
      options: languageOptions,
    },
    {
      type: "radio",
      question: "Please describe your experience with Rust.",
      direction: "column",
      id: "rustExperience",
      options: [
        "I have never used Rust",
        "I have written a few lines of Rust code",
        "I have written a small project in Rust",
        "I have written a large project in Rust",
      ],
      track: "individual",
    },
    {
      type: "radio",
      question: "Please describe your organization's experience with Rust.",
      direction: "column",
      id: "orgRustExperience",
      options: [
        "We have never used Rust",
        "We have deployed a small project in Rust",
        "We have deployed one or more large projects in Rust",
      ],
      track: "organization",
    },
    {
      type: "multipleChoice",
      question: "What motivates your interest in Rust?",
      direction: "column",
      id: "motivationRust",
      options: [
        "Performance benefits",
        "Memory safety without garbage collection",
        "Curiosity about new technologies",
        "Potential for career development",
        "Exploration of Rust's zero-cost abstractions for efficient code.",
        "Writing more reliable software.",
        "Usage in embedded systems or IoT projects.",
      ],
    },
    {
      type: "input",
      question:
        "Do you see any big challenges in adopting Rust in your organization?",
      id: "biggestChallenge",
      track: "organization",
    },
    {
      type: "multipleChoice",
      question: "Which of the following concerns you the most about Rust?",
      id: "concerns",
      direction: "column",
      options: [
        "Ecosystem maturity",
        "Lack of specific libraries and frameworks for your use case",
        "Steep learning curve",
        "Hiring and retaining Rust developers",
        "Long build times",
        "Tooling and IDE support",
        "Integration with existing codebase",
        "Long-term existence of Rust",
      ],
    },
    {
      type: "multipleChoice",
      question:
        "Which of the following best describes the industry you work in?",
      id: "industry",
      direction: "column",
      options: [
        "Aerospace",
        "Automotive",
        "Banking",
        "Consumer Electronics",
        "Defense",
        "Education",
        "Energy",
        "Finance",
        "Government",
        "Healthcare",
        "Insurance",
        "Manufacturing",
        "Media",
        "Retail",
        "Software",
        "Telecommunications",
        "Transportation",
        "Travel",
        "Other",
      ],
      track: "organization",
    },
    {
      type: "input",
      question: "How big is your development team?",
      id: "teamSize",
      track: "organization",
    },
    {
      type: "multipleChoice",
      question:
        "What kind of support or resources would you need to successfully adopt Rust?",
      id: "neededSupport",
      direction: "column",
      options: [
        "Training courses",
        "Mentorship",
        "Code Reviews",
        "Hands-on implementation support",
        "Open Sourcing Guidance",
        "Documentation and Best Practices Guides",
        "Tooling and Infrastructure Support",
        "Project Templates and Examples",
        "Security Analysis Tools and Support",
        "Performance Optimization",
        "Cross-platform Development Guidance",
        "Enterprise Integration Support",
        "Other",
      ],
    },
    {
      type: "email",
      question:
        "Please enter your email to receive a customized proposal based on your needs.",
      id: "email",
    },
  ];

  let answers = {};
  const progressBar = document.getElementById("progress-bar");
  let totalQuestions = questions.length;
  let currentQuestionIndex = 1;

  document.getElementById("nextQuestion").addEventListener("click", () => {
    nextQuestion();
  });

  function nextQuestion() {
    // If the user track is not set, set it based on the first question
    if (!userTrack) {
      // get input with name serviceType
      const serviceType = document.querySelector(
        'input[name="serviceType"]:checked'
      );
      userTrack = serviceType.value.toLowerCase();
      console.log("User track is", userTrack);
    }

    // This is a bit crude, but it gets the job done
    // Get the quiz container and store the user's answers
    const quizContainer = document.getElementById("question-container");
    const inputs = quizContainer.querySelectorAll(
      "input[type='text'], input[type='email'], input[type='radio'], input[type='checkbox']"
    );

    inputs.forEach((input) => {
      if (input.type === "radio" || input.type === "email") {
        if (input.checked) {
          answers[input.name] = input.value;
        }
      } else if (input.type === "checkbox") {
        if (input.checked) {
          if (!answers[input.name]) {
            answers[input.name] = [];
          }
          answers[input.name].push(input.value);
        }
      } else {
        answers[input.id] = input.value;
      }
    });

    console.log(answers);

    let foundNextQuestion = false;
    while (currentQuestionIndex < questions.length && !foundNextQuestion) {
      const nextQuestionTrack = questions[currentQuestionIndex].track;
      if (!nextQuestionTrack || nextQuestionTrack === userTrack) {
        displayQuestion(currentQuestionIndex++);
        foundNextQuestion = true;
      } else {
        currentQuestionIndex++; // Skip questions not matching the track
      }
    }

    if (!foundNextQuestion) {
      submitQuiz(); // All questions have been answered
    }
  }

  // Get previous question based on current track
  function previousQuestion() {
    let foundPreviousQuestion = false;
    while (currentQuestionIndex > 0 && !foundPreviousQuestion) {
      const previousQuestionTrack = questions[currentQuestionIndex - 2].track;
      if (!previousQuestionTrack || previousQuestionTrack === userTrack) {
        displayQuestion(--currentQuestionIndex - 1);
        foundPreviousQuestion = true;
      } else {
        currentQuestionIndex--; // Skip questions not matching the track
      }
    }
  }

  document.getElementById("prevQuestion").addEventListener("click", () => {
    previousQuestion();
  });

  function updateProgressBar() {
    const progressPercentage = (currentQuestionIndex / totalQuestions) * 100;
    progressBar.style.width = `${progressPercentage}%`;
  }

  function displayQuestion(index) {
    history.pushState(
      { index: index },
      `Question ${index}`,
      `?question=${index}`
    );

    updateProgressBar();

    const questionContainer = document.getElementById("question-container");
    questionContainer.innerHTML = ""; // Clear existing content

    const question = questions[index];
    const questionElement = document.createElement("div");
    questionElement.className = "question";
    questionElement.innerHTML = `<h2>${question.question}</h2>`;

    // Initially hide the navigation buttons for 'radio' type questions
    const navContainer = document.getElementById("navigation-container");

    // Hide navContainer for first question
    if (index === 0) {
      navContainer.style.display = "none";
    } else {
      navContainer.style.display = "flex";
    }

    document.getElementById("nextQuestion").disabled = true;

    let inputElement;

    switch (question.type) {
      case "multipleChoice":
        const gridContainer = document.createElement("div");

        // Set the direction if specified
        if (question.direction) {
          gridContainer.style.display = "flex";
          gridContainer.style.flexDirection = question.direction;
        } else {
          gridContainer.className = "checkbox-grid";
        }

        question.options.forEach((option) => {
          const optionElement = document.createElement("label");
          optionElement.className = "checkbox-label"; // Use this class for checkbox labels
          const inputElement = document.createElement("input");
          inputElement.type = "checkbox";
          inputElement.name = question.id;
          inputElement.value = option;

          optionElement.appendChild(inputElement);
          optionElement.append(" " + option);

          gridContainer.appendChild(optionElement);
        });

        questionElement.appendChild(gridContainer);
        break;
      case "checkbox":
        question.options.forEach((option) => {
          inputElement = document.createElement("input");
          inputElement.type = "checkbox";
          inputElement.id = option;
          inputElement.value = option;
          questionElement.appendChild(inputElement);
          questionElement.appendChild(document.createTextNode(option));
        });
        break;
      case "input":
      case "email":
        inputElement = document.createElement("input");
        inputElement.type = question.type === "email" ? "email" : "text";
        inputElement.id = question.id;
        // Append inputElement to questionElement, not directly to questionContainer
        questionElement.appendChild(inputElement);
        break;
      case "radio":
        const flexContainer = document.createElement("div");
        flexContainer.className = "quiz-flex-container";

        // Set the direction of the flex container if specified
        if (question.direction) {
          flexContainer.style.flexDirection = question.direction;
        }

        question.options.forEach((option) => {
          const optionLabel = document.createElement("label");
          optionLabel.className = "quiz-button";
          optionLabel.textContent = option;

          const inputElement = document.createElement("input");
          inputElement.type = "radio";
          inputElement.name = question.id;
          inputElement.value = option;
          inputElement.onchange = () => {
            // Automatically move to the next question on selecting a radio option
            nextQuestion();
          };

          optionLabel.appendChild(inputElement);
          flexContainer.appendChild(optionLabel);
        });

        questionElement.appendChild(flexContainer);
        break;
    }

    // Append the fully constructed questionElement to the questionContainer
    questionContainer.appendChild(questionElement);

    if (currentQuestionIndex > 1) {
      document.getElementById("prevQuestion").style.display = "";
    } else {
      document.getElementById("prevQuestion").style.display = "none";
    }

    // Enable the 'Next' button as soon as any input is made
    document.getElementById("nextQuestion").disabled = true; // Initially disabled

    // Attach event listeners directly to inputs for immediate feedback
    const inputs = questionContainer.querySelectorAll(
      "input[type='text'], input[type='email'], input[type='radio'], input[type='checkbox']"
    );
    inputs.forEach((input) => {
      input.addEventListener("input", () => {
        // For text and email fields, enable the Next button as soon as there is any input
        document.getElementById("nextQuestion").disabled = false;
      });
      input.addEventListener("change", () => {
        // For radio buttons and checkboxes, enable the Next button as soon as an option is selected
        document.getElementById("nextQuestion").disabled = false;
      });
    });
  }

  function submitQuiz() {
    const answers = questions.reduce((acc, question) => {
      const inputElements = document.getElementsByName(question.id);
      if (
        question.type === "radio" ||
        question.type === "input" ||
        question.type === "email"
      ) {
        const selectedInput = Array.from(inputElements).find(
          (el) => el.checked || el.type === "text" || el.type === "email"
        );
        if (selectedInput) {
          acc[question.id] = selectedInput.value;
        }
      } else if (question.type === "multipleChoice") {
        // Specifically check for checked checkboxes and map their values
        acc[question.id] = Array.from(inputElements)
          .filter((el) => el.checked)
          .map((el) => el.value);
      }
      return acc;
    }, {});

    console.log(JSON.stringify(answers, null, 2));
  }

  displayQuestion(0); // Initialize with the first question

  window.addEventListener("popstate", function (event) {
    if (event.state) {
      displayQuestion(event.state.index);
    } else {
      // If there is no state, reset to the first question
      displayQuestion(0);
    }
  });
</script>

<style>
  .quiz-container {
    max-width: 600px;
    margin: 0 auto;
    overflow: hidden; /* Add this to prevent content from overflowing */
  }

  .progress-container {
    width: 100%;
    background-color: #ddd;
    height: 5px;
    margin-bottom: 20px;
  }

  .progress-bar {
    height: 100%;
    background-color: #ee3856;
    transition: width 0.5s ease-in-out; /* Smooth transition for width changes */
  }

  #navigation-container {
    width: 100%;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
  }

  .navbutton {
    padding: 10px 20px;
    background-color: #111; /*$brightPrim */
    color: white;
    cursor: pointer;
    border: none;
  }

  .quiz-flex-container {
    display: flex;
    gap: 10px; /* Adjust based on your preference */
    flex-wrap: wrap; /* Allow items to wrap if they can't fit in a single line */
  }

  .quiz-button {
    padding: 50px 15px;
    border-radius: 4px;
    background-color: #111; /*$brightPrim */
    color: white;
    white-space: nowrap;
    cursor: pointer;
    flex: 1; /* Makes buttons take up equal space */
    text-align: center;
    cursor: pointer;
    font-size: large;
  }

  .quiz-button:hover {
    background-color: #ee3856;
  }

  /* Convert to hand cursor on hover over the buttons or labels */
  input,
  .checkbox-label,
  .quiz-button:hover {
    cursor: pointer;
  }

  /* If the next button is disabled, change the cursor to not-allowed */
  #nextQuestion:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }

  .quiz-button input[type="radio"] {
    display: none; /* Hide the actual radio button */
  }

  .quiz-container input[type="text"],
  .quiz-container input[type="email"] {
    font-size: larger;
    width: 100%; /* Fill the entire width */
    padding: 15px; /* Comfortable padding */
    border: 1px solid #000; /* 1px black border */
    box-sizing: border-box; /* Padding and border included in the width */
    margin-bottom: 20px; /* Space below each input */
  }

  /* Placeholder styling */
  .quiz-container input::placeholder {
    color: #ccc; /* Light grey placeholder text */
  }

  .question h2 {
    margin: 0;
  }

  /* Grid layout for checkboxes */
  .question .checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }

  /* Custom larger checkbox style */
  .question input[type="checkbox"] {
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    margin-right: 10px;
    width: 20px;
    height: 20px;
    border: 2px solid #111;
    border-radius: 4px;
    vertical-align: middle;
  }

  .question input[type="checkbox"]:checked {
    border: 2px solid #111;
    background-color: #ee3856;
  }

  /* Ensure inputs do not exceed the container's width on smaller screens */
  @media (max-width: 600px) {
    .quiz-container input[type="text"],
    .quiz-container input[type="email"] {
      width: calc(100% - 30px); /* Adjust width to account for padding */
    }
  }

  /* Dark mode styles */
  @media (prefers-color-scheme: dark) {
    .quiz-button {
      background-color: #fab71c;
      color: #111; /* Dark text */
    }

    .question input[type="checkbox"] {
      border-color: #fff; /* Light border */
    }

    .question input[type="checkbox"]:checked {
      border: 2px solid #fff;
      background-color: #ee3856;
    }
  }
</style>

{% endblock content %}
